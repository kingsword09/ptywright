name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.6"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Format
        run: bun run format:check

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CI: true
      TUI_TEST_PTY_BACKEND: ${{ runner.os == 'Windows' && 'bun-pty' || 'auto' }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.6"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test (Unit + MCP Smoke)
        run: bun test

      - name: Smoke Test (Scripts)
        # Run regression scripts to generate report. 
        # Continue on error to upload artifacts.
        run: bun run script:run-all --artifacts-root .tmp/cli-smoke
        continue-on-error: true

      - name: Upload CLI Smoke Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-smoke-${{ matrix.os }}
          path: .tmp/cli-smoke/
          retention-days: 5

